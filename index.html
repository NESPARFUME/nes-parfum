<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NES PARFUM</title>
    <style>
        :root { --bg-color: #fcfaf5; --header-bg: #1a1410; --gold: #d2a95c; --text-dark: #333; --card-bg: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-dark); }
        .announcement-bar { background-color: var(--gold); color: #000; text-align: center; padding: 8px; font-weight: bold; display: none; }
        header { background-color: var(--header-bg); padding: 20px; display: flex; justify-content: space-between; align-items: center; color: var(--gold); }
        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        .filters { display: flex; gap: 10px; margin-bottom: 20px; }
        .filter-btn { padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; }
        .filter-btn.active { background: var(--gold); color: white; border-color: var(--gold); }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .product-card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .product-img { width: 100%; height: 150px; object-fit: contain; margin-bottom: 10px; }
        .product-price { color: var(--gold); font-weight: bold; font-size: 18px; margin: 10px 0; }
        .admin-section { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .admin-form input, .admin-form select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; }
        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="announcement-bar" id="announcement-bar"></div>
    <div id="store-view">
        <header><h1>NES PARFUM</h1><button onclick="openCart()">🛒 Sepet</button></header>
        <div class="container">
            <div class="filters">
                <button class="filter-btn active" onclick="filterCategory('Tümü', this)">Tümü</button>
                <button class="filter-btn" onclick="filterCategory('Erkek', this)">Erkek</button>
                <button class="filter-btn" onclick="filterCategory('Kadın', this)">Kadın</button>
            </div>
            <div id="products-container" class="products-grid"></div>
        </div>
    </div>

    <div id="admin-view" style="display: none;">
        <header><h1>YÖNETİM</h1><button onclick="showStore()">Mağazaya Dön</button></header>
        <div class="container">
            <div class="admin-section">
                <h2>Ürün Ekle</h2>
                <div class="admin-form">
                    <input type="text" id="new-name" placeholder="Parfüm Adı">
                    <input type="number" id="new-price" placeholder="Fiyat">
                    <select id="new-currency"><option value="₺">TL (₺)</option><option value="$">Dolar ($)</option></select>
                    <select id="new-cat"><option value="Erkek">Erkek</option><option value="Kadın">Kadın</option></select>
                    <input type="file" id="new-img" accept="image/*">
                    <button onclick="addProduct()">Ürünü Ekle</button>
                </div>
            </div>
            <div id="admin-products-list"></div>
        </div>
    </div>
    
    <div style="text-align:center; margin-top:20px;"><button onclick="document.getElementById('admin-login-modal').style.display='flex'">Yönetici Paneli</button></div>

    <script>
        let products = JSON.parse(localStorage.getItem('nes_products')) || [];
        
        function addProduct() {
            const name = document.getElementById('new-name').value;
            const price = document.getElementById('new-price').value;
            const currency = document.getElementById('new-currency').value;
            const cat = document.getElementById('new-cat').value;
            const file = document.getElementById('new-img').files[0];

            if (!file) { alert("Resim seçin!"); return; }

            const reader = new FileReader();
            reader.onload = function(e) {
                products.push({ id: Date.now(), name, price, currency, cat, img: e.target.result });
                localStorage.setItem('nes_products', JSON.stringify(products));
                renderProducts(); renderAdminProducts();
            };
            reader.readAsDataURL(file);
        }

        function renderProducts(cat = 'Tümü') {
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            products.filter(p => cat === 'Tümü' || p.cat === cat).forEach(p => {
                container.innerHTML += `
                    <div class="product-card">
                        <img src="${p.img}" class="product-img">
                        <h3>${p.name}</h3>
                        <div class="product-price">${p.price} ${p.currency}</div>
                    </div>
                `;
            });
        }

        function filterCategory(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderProducts(cat);
        }

        function renderAdminProducts() {
            const list = document.getElementById('admin-products-list');
            list.innerHTML = '';
            products.forEach(p => {
                list.innerHTML += `<div>${p.name} - ${p.price}${p.currency} <button class="btn-delete" onclick="deleteProduct(${p.id})">Sil</button></div>`;
            });
        }

        function deleteProduct(id) {
            products = products.filter(p => p.id !== id);
            localStorage.setItem('nes_products', JSON.stringify(products));
            renderProducts(); renderAdminProducts();
        }

        window.onload = () => { renderProducts(); renderAdminProducts(); };
    </script>
</body>
</html>
