<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NES PARFUM</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --bg-color: #fcfaf5; --header-bg: #1a1410; --gold: #d2a95c; --text-dark: #333; --card-bg: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-dark); }
        header { background-color: var(--header-bg); padding: 20px; display: flex; justify-content: space-between; align-items: center; color: var(--gold); }
        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        .filters { display: flex; gap: 10px; margin-bottom: 20px; }
        .filter-btn { padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; font-weight: bold; }
        .filter-btn.active { background: var(--gold); color: white; border-color: var(--gold); }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .product-card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .product-img { width: 100%; height: 160px; object-fit: contain; margin-bottom: 10px; border-radius: 8px; }
        .product-price { color: var(--gold); font-weight: bold; font-size: 18px; margin: 10px 0; }
        .admin-section { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .admin-form input, .admin-form select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .btn-primary { width: 100%; background: var(--header-bg); color: var(--gold); padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .qty-btn { background: var(--gold); color: white; border: none; width: 30px; height: 30px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* MODAL TASARIMI */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .close-btn { cursor: pointer; font-size: 24px; font-weight: bold; color: #888; }
    </style>
</head>
<body>

    <div id="store-view">
        <header>
            <h1>NES PARFUM</h1>
            <button class="btn-primary" style="width: auto; padding: 8px 15px; border-radius: 20px;" onclick="openCart()">🛒 Sepet <span id="cart-count">0</span></button>
        </header>
        <div class="container">
            <div class="filters">
                <button class="filter-btn active" onclick="filterCategory('Tümü', this)">Tümü</button>
                <button class="filter-btn" onclick="filterCategory('Erkek', this)">Erkek</button>
                <button class="filter-btn" onclick="filterCategory('Kadın', this)">Kadın</button>
            </div>
            <div id="products-container" class="products-grid"></div>
        </div>
    </div>

    <div class="modal" id="cart-modal">
        <div class="modal-content">
            <div class="modal-header"><h2>Sepetiniz</h2><span class="close-btn" onclick="closeCart()">&times;</span></div>
            <div id="cart-items"></div>
            <h3 style="text-align: right; margin: 20px 0; color: var(--gold);" id="cart-total">Toplam: 0</h3>
            <button class="btn-primary" id="prepare-order-btn" onclick="showCheckoutForm()">Siparişi Hazırla</button>
            
            <div id="checkout-form" style="display: none; margin-top: 15px;">
                <input type="text" id="cust-name" placeholder="Adınız Soyadınız" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px;">
                <input type="tel" id="cust-phone" placeholder="Telefon Numaranız" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px;">
                <button class="btn-primary" style="background: #25D366; color: white;" onclick="confirmOrder()">💬 WhatsApp'tan Sipariş Ver</button>
            </div>
        </div>
    </div>

    <div class="modal" id="admin-login-modal">
        <div class="modal-content">
            <div class="modal-header"><h2>Admin Girişi</h2><span class="close-btn" onclick="document.getElementById('admin-login-modal').style.display='none'">&times;</span></div>
            <input type="password" id="admin-password" placeholder="Şifrenizi Girin" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 5px;">
            <button class="btn-primary" onclick="checkAdminPassword()">Giriş Yap</button>
        </div>
    </div>

    <div id="admin-view" style="display: none;">
        <header>
            <h1>YÖNETİM PANELİ</h1>
            <button class="btn-primary" style="width: auto; padding: 8px 15px; border-radius: 20px;" onclick="showStore()">Mağazaya Dön</button>
        </header>
        <div class="container">
            <div class="admin-section">
                <h2>📱 Telefondan Yeni Ürün Ekle</h2>
                <div class="admin-form">
                    <input type="text" id="new-name" placeholder="Parfüm Adı">
                    <input type="number" id="new-price" placeholder="Fiyat">
                    <select id="new-currency"><option value="₺">TL (₺)</option><option value="$">Dolar ($)</option></select>
                    <select id="new-cat"><option value="Erkek">Erkek</option><option value="Kadın">Kadın</option></select>
                    <label style="font-size: 14px; font-weight: bold; margin-bottom: 5px; display: block;">🖼️ Galeriden Fotoğraf Seç:</label>
                    <input type="file" id="new-img" accept="image/*">
                    <button class="btn-primary" onclick="addProduct()">Tüm Dünyaya Ürünü Ekle</button>
                </div>
            </div>
            <div class="admin-section">
                <h2>Mevcut Ürünleri Yönet</h2>
                <div id="admin-products-list"></div>
            </div>
        </div>
    </div>
    
    <div style="text-align:center; margin-top:20px; padding-bottom: 30px;">
        <button style="background:none; border:none; color:#888; text-decoration:underline; cursor:pointer;" onclick="document.getElementById('admin-login-modal').style.display='flex'">Yönetici Paneli</button>
    </div>

    <script>
        // --- SENİN PROJENE ÖZEL VERİTABANI BAĞLANTISI ---
        const firebaseConfig = {
          apiKey: "AIzaSyCLxo3IbO4Ev_2BSAWLj08M14bkESXvF28",
          authDomain: "nesparfume.firebaseapp.com",
          projectId: "nesparfume",
          storageBucket: "nesparfume.firebasestorage.app",
          messagingSenderId: "95878878165",
          appId: "1:95878878165:web:c318870a47e5aecf6fe35c",
          measurementId: "G-90GT545BDF",
          // Tahmin ettiğimiz doğru veritabanı adresi (Çalışacaktır!):
          databaseURL: "https://nesparfume-default-rtdb.firebaseio.com"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let products = [];
        let cart = {};
        let currentCat = 'Tümü';

        // VERİTABANINDAN ÇEKME
        db.ref('products').on('value', (snapshot) => {
            products = [];
            snapshot.forEach(child => {
                products.push({ id: child.key, ...child.val() });
            });
            renderProducts(currentCat);
            renderAdminProducts();
        });

        // VİTRİN GÖRÜNÜMÜ
        function renderProducts(cat = 'Tümü') {
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            const filtered = products.filter(p => cat === 'Tümü' || p.cat === cat);
            
            if (filtered.length === 0) {
                container.innerHTML = '<p style="color:#888;">Henüz ürün eklenmemiş.</p>';
                return;
            }

            filtered.forEach(p => {
                const qty = cart[p.id] || 0;
                container.innerHTML += `
                    <div class="product-card">
                        <img src="${p.img}" class="product-img">
                        <h3 style="font-family: 'Times New Roman', serif;">${p.name}</h3>
                        <div style="font-size: 12px; color: #888;">${p.cat}</div>
                        <div class="product-price">${p.price} ${p.currency}</div>
                        <div style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
                            <button class="qty-btn" onclick="updateCart('${p.id}', -1)">-</button>
                            <span id="qty-${p.id}">${qty}</span>
                            <button class="qty-btn" onclick="updateCart('${p.id}', 1)">+</button>
                        </div>
                    </div>
                `;
            });
            updateCartCount();
        }

        function filterCategory(cat, btn) {
            currentCat = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderProducts(cat);
        }

        // SEPET İŞLEMLERİ
        function updateCart(productId, change) {
            if (!cart[productId]) cart[productId] = 0;
            cart[productId] += change;
            if (cart[productId] <= 0) delete cart[productId];
            const qtyElement = document.getElementById(`qty-${productId}`);
            if (qtyElement) qtyElement.innerText = cart[productId] || 0;
            updateCartCount();
        }

        function updateCartCount() {
            let totalItems = 0;
            for (let id in cart) totalItems += cart[id];
            document.getElementById('cart-count').innerText = totalItems;
        }

        function openCart() {
            document.getElementById('cart-modal').style.display = 'flex';
            document.getElementById('checkout-form').style.display = 'none';
            document.getElementById('prepare-order-btn').style.display = 'block';
            
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            
            if (Object.keys(cart).length === 0) {
                container.innerHTML = '<p>Sepetiniz boş.</p>';
                document.getElementById('cart-total').innerText = '';
                document.getElementById('prepare-order-btn').style.display = 'none';
                return;
            }

            let totalTL = 0; let totalUSD = 0;
            for (let id in cart) {
                const product = products.find(p => p.id === id);
                if (product) {
                    const itemTotal = product.price * cart[id];
                    if (product.currency === '₺') totalTL += itemTotal;
                    if (product.currency === '$') totalUSD += itemTotal;
                    container.innerHTML += `<div class="cart-item"><div><strong>${product.name}</strong> (${cart[id]} adet)</div><div>${itemTotal} ${product.currency}</div></div>`;
                }
            }
            
            let totalText = "Toplam: ";
            if (totalTL > 0) totalText += `${totalTL} ₺ `;
            if (totalUSD > 0) totalText += `+ ${totalUSD} $`;
            document.getElementById('cart-total').innerText = totalText;
        }

        function closeCart() { document.getElementById('cart-modal').style.display = 'none'; }
        function showCheckoutForm() {
            document.getElementById('prepare-order-btn').style.display = 'none';
            document.getElementById('checkout-form').style.display = 'block';
        }

        // WHATSAPP
        function confirmOrder() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            if(!name || !phone) { alert("Lütfen adınızı ve numaranızı girin."); return; }

            // *** KENDİ NUMARANI BURAYA YAZ ***
            const adminTelefon = "905010074171"; 

            let orderDetails = []; let totalTL = 0; let totalUSD = 0;
            for (let id in cart) {
                const p = products.find(prod => prod.id === id);
                if(p) {
                    orderDetails.push(`- ${p.name} (${cart[id]} adet)`);
                    if(p.currency === '₺') totalTL += p.price * cart[id];
                    if(p.currency === '$') totalUSD += p.price * cart[id];
                }
            }

            let totalText = "";
            if (totalTL > 0) totalText += `${totalTL} ₺ `;
            if (totalUSD > 0) totalText += `+ ${totalUSD} $`;

            let mesaj = `Merhaba NES PARFUM, yeni siparişim var! 🛍️\n\n👤 *Müşteri:* ${name}\n📱 *İletişim:* ${phone}\n\n📦 *Ürünler:*\n${orderDetails.join('\n')}\n\n💰 *Ara Toplam:* ${totalText}`;
            window.open(`https://wa.me/${adminTelefon}?text=${encodeURIComponent(mesaj)}`, '_blank'); 
            
            cart = {}; closeCart(); renderProducts(currentCat);
        }

        // ADMIN PANELİ
        function checkAdminPassword() {
            if (document.getElementById('admin-password').value === '1068nes') {
                document.getElementById('admin-login-modal').style.display = 'none';
                document.getElementById('store-view').style.display = 'none';
                document.getElementById('admin-view').style.display = 'block';
                document.getElementById('admin-password').value = '';
            } else { alert('Hatalı Şifre!'); }
        }

        function showStore() {
            document.getElementById('admin-view').style.display = 'none';
            document.getElementById('store-view').style.display = 'block';
        }

        function renderAdminProducts() {
            const list = document.getElementById('admin-products-list');
            list.innerHTML = '';
            if (products.length === 0) { list.innerHTML = '<p>Kayıtlı ürün bulunamadı.</p>'; return; }

            products.forEach(p => {
                list.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; background:#f9f9f9; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #eee;">
                        <div><strong>${p.name}</strong> (${p.cat})<br><span style="color:#888;">${p.price} ${p.currency}</span></div>
                        <button class="btn-delete" onclick="deleteProduct('${p.id}')">Sil</button>
                    </div>
                `;
            });
        }

        function addProduct() {
            const name = document.getElementById('new-name').value;
            const price = document.getElementById('new-price').value;
            const currency = document.getElementById('new-currency').value;
            const cat = document.getElementById('new-cat').value;
            const fileInput = document.getElementById('new-img');

            if (!name || !price) { alert("Lütfen isim ve fiyat girin!"); return; }
            if (!fileInput.files[0]) { alert("Lütfen galeriden bir resim seçin!"); return; }

            // Dosya boyutunu kontrol et (çok büyükse uyarı ver)
            if (fileInput.files[0].size > 2000000) { 
                alert("Uyarı: Seçtiğiniz fotoğraf boyutu çok büyük (2MB üstü). Lütfen fotoğrafı biraz küçültün veya ekran görüntüsü alıp onu yükleyin, aksi takdirde diğer telefonlarda görünmeyebilir."); 
                return; 
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                db.ref('products').push({
                    name: name,
                    price: parseFloat(price),
                    currency: currency,
                    cat: cat,
                    img: e.target.result
                }).then(() => {
                    alert("Ürün başarıyla tüm dünyaya eklendi! 🎉");
                    document.getElementById('new-name').value = '';
                    document.getElementById('new-price').value = '';
                    fileInput.value = '';
                }).catch((error) => {
                    alert("Ekleme başarısız. Lütfen internet bağlantınızı kontrol edin. Hata: " + error.message);
                });
            };
            reader.readAsDataURL(fileInput.files[0]);
        }

        function deleteProduct(id) {
            if (confirm("Bu ürünü tamamen silmek istediğinize emin misiniz?")) {
                db.ref('products/' + id).remove().then(() => {
                    if (cart[id]) delete cart[id];
                });
            }
        }
    </script>
</body>
</html>
