<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NES PARFUM - Parfüm Alışveriş</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">🌸 NES PARFUM 🌸</h1>
                <p class="tagline">En Güzel Kokuların Evi</p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Admin Panel Butonu -->
            <div class="admin-btn-container">
                <button class="btn-admin" onclick="toggleAdminPanel()">📋 Admin Paneli</button>
            </div>

            <!-- Admin Panel -->
            <div id="adminPanel" class="admin-panel hidden">
                <div class="admin-content">
                    <h2>Admin Paneli - Parfüm Ekle</h2>
                    <div class="form-group">
                        <label>Parfüm Adı:</label>
                        <input type="text" id="parfumAdi" placeholder="Örn: Rose Garden">
                    </div>
                    <div class="form-group">
                        <label>Fiyat (₺):</label>
                        <input type="number" id="parfumFiyat" placeholder="Örn: 150" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Fotoğraf URL:</label>
                        <input type="text" id="parfumFoto" placeholder="https://örnek.com/resim.jpg">
                    </div>
                    <button class="btn-ekle" onclick="parfumEkle()">✅ Parfümü Ekle</button>
                </div>
            </div>

            <!-- Ürünler Listesi -->
            <div class="urunler-container">
                <h2>🛍️ Parfüm Koleksiyonu</h2>
                <div id="urunlerListesi" class="urunler-grid">
                    <!-- Ürünler buraya gelecek -->
                </div>
            </div>

            <!-- Sepet ve Siparişi Hazırla -->
            <div class="siparis-container">
                <h2>📦 Siparişiniz</h2>
                <div id="sepetListesi" class="sepet-listesi">
                    <p class="empty-cart">Henüz ürün seçilmedi</p>
                </div>
                <div class="siparis-form">
                    <div class="form-group">
                        <label>Ad Soyadınız:</label>
                        <input type="text" id="musteriAdi" placeholder="Adınızı girin">
                    </div>
                    <div class="form-group">
                        <label>Telefon:</label>
                        <input type="tel" id="musteriTelefon" placeholder="0501 XXX XX XX">
                    </div>
                    <div class="form-group">
                        <label>Adres:</label>
                        <textarea id="musteriAdresi" placeholder="Teslimat adresinizi girin"></textarea>
                    </div>
                    <div class="toplam-fiyat">
                        <h3>Toplam: <span id="toplamFiyat">0</span> ₺</h3>
                    </div>
                    <button class="btn-hazirla" onclick="siparisHazirla()">⚙️ Siparişi Hazırla</button>
                </div>
            </div>

            <!-- Siparişi Onayla Modal -->
            <div id="onayModal" class="modal hidden">
                <div class="modal-content">
                    <h2>📋 Sipariş Özeti</h2>
                    <div id="onayListesi" class="onay-listesi"></div>
                    <div class="onay-toplam">
                        <h3>Toplam Tutar: <span id="onayToplam">0</span> ₺</h3>
                    </div>
                    <div class="modal-buttons">
                        <button class="btn-iptal" onclick="closeModal()">❌ İptal</button>
                        <button class="btn-onayla" onclick="siparisOnayla()">✅ Onayla ve Siparişi Gönder</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-content">
                <p>&copy; 2026 NES PARFUM - Tüm Hakları Saklıdır</p>
                <a href="https://wa.me/905012074171?text=Merhaba%20NES%20PARFUM!%20Sipariş%20vermek%20istiyorum." target="_blank" class="whatsapp-link">
                    💬 WhatsApp ile İletişim: +90 501 207 41 71
                </a>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
