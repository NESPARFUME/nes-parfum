
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NES PARFUM</title>
    <style>
        /* Tasarım sabitleri */
        :root { --bg-color: #fcfaf5; --header-bg: #1a1410; --gold: #d2a95c; --text-dark: #333; --card-bg: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg-color); }
        .announcement-bar { background-color: var(--gold); color: #000; text-align: center; padding: 8px; font-weight: bold; display: none; }
        header { background-color: var(--header-bg); padding: 20px; display: flex; justify-content: space-between; align-items: center; color: var(--gold); }
        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .product-card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .product-img { width: 100%; height: 150px; object-fit: contain; margin-bottom: 10px; }
        .product-price { color: var(--gold); font-weight: bold; font-size: 18px; margin: 10px 0; }
        .btn-primary { width: 100%; background: var(--header-bg); color: var(--gold); padding: 15px; border: none; border-radius: 8px; cursor: pointer; }
        .admin-section { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="announcement-bar" id="announcement-bar"></div>
    <div id="store-view">
        <header>
            <h1>NES PARFUM</h1>
            <button class="cart-btn" onclick="openCart()">🛒 Sepet <span id="cart-count">0</span></button>
        </header>
        <div class="container">
            <div id="products-container" class="products-grid"></div>
        </div>
    </div>

    <div id="admin-view" style="display: none;">
        <header><h1>YÖNETİM</h1></header>
        <div class="container">
            <div class="admin-section">
                <h2>Yeni Ürün Ekle</h2>
                <input type="text" id="new-prod-name" placeholder="Parfüm Adı"><br>
                <input type="number" id="new-prod-price" placeholder="Fiyat">
                <select id="new-prod-currency">
                    <option value="₺">TL (₺)</option>
                    <option value="$">Dolar ($)</option>
                </select>
                <button onclick="addProduct()">Ürünü Ekle</button>
            </div>
        </div>
    </div>

    <script>
        let products = JSON.parse(localStorage.getItem('nes_products')) || [];
        let cart = {};

        function addProduct() {
            const name = document.getElementById('new-prod-name').value;
            const price = document.getElementById('new-prod-price').value;
            const currency = document.getElementById('new-prod-currency').value;
            
            products.push({ id: Date.now(), name, price, currency });
            localStorage.setItem('nes_products', JSON.stringify(products));
            alert("Ürün eklendi!");
            renderProducts();
        }

        function renderProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            products.forEach(p => {
                container.innerHTML += `
                    <div class="product-card">
                        <h3>${p.name}</h3>
                        <div class="product-price">${p.price}${p.currency}</div>
                        <button class="btn-primary" onclick="addToCart(${p.id})">Ekle</button>
                    </div>
                `;
            });
        }

        function addToCart(id) { cart[id] = (cart[id] || 0) + 1; updateCartCount(); }
        function updateCartCount() { document.getElementById('cart-count').innerText = Object.values(cart).reduce((a,b)=>a+b, 0); }

        window.onload = renderProducts;
    </script>
</body>
</html>
